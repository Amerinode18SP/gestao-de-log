<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Rings / Arcs - Blue top, Red bottom -->
  <g transform="translate(100,48)">
    <!-- Ring 1 - top blue -->
    <ellipse cx="0" cy="-22" rx="52" ry="10" fill="none" stroke="#1a6bbd" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="290 40" stroke-dashoffset="0"/>
    <!-- Ring 2 -->
    <ellipse cx="0" cy="-11" rx="54" ry="10" fill="none" stroke="#2278cc" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="300 40" stroke-dashoffset="0"/>
    <!-- Ring 3 -->
    <ellipse cx="0" cy="0" rx="56" ry="10" fill="none" stroke="#2985d5" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="310 40" stroke-dashoffset="0"/>
    <!-- Ring 4 - transition -->
    <ellipse cx="0" cy="11" rx="54" ry="10" fill="none" stroke="#c0392b" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="300 40" stroke-dashoffset="0"/>
    <!-- Ring 5 - red bottom -->
    <ellipse cx="0" cy="22" rx="52" ry="10" fill="none" stroke="#a93226" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="290 40" stroke-dashoffset="0"/>
  </g>
  <!-- Text: amerinode -->
  <text x="100" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="1">
    <tspan fill="#1a6bbd">ameri</tspan><tspan fill="#c0392b">node</tspan><tspan fill="#c0392b" font-size="11" dy="-8">™</tspan>
  </text>
</svg>
